    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="0.5"/>
  </g>
  <!-- Shield -->
  <path d="M160 180 L260 240 L260 340 C260 410 210 450 160 470 C110 450 60 410 60 340 L60 240 Z" stroke="url(#g2)" stroke-width="4" fill="none" opacity="0.15"/>
  <path d="M130 280 L160 310 L200 260" stroke="url(#g2)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Title -->
  <text x="340" y="310" font-family="'Courier New', monospace" font-size="72" font-weight="bold" fill="url(#g2)" letter-spacing="4">ZKLease</text>
  <!-- Subtitle -->
