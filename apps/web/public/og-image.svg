  <text x="410" y="444" font-family="monospace" font-size="14" fill="#8B5CF6" text-anchor="middle">Noir UltraHonk</text>
  <rect x="500" y="420" width="140" height="36" rx="18" stroke="#06B6D4" stroke-width="1.5" fill="none" opacity="0.8"/>
