  <rect x="660" y="420" width="160" height="36" rx="18" stroke="#10B981" stroke-width="1.5" fill="none" opacity="0.8"/>
  <text x="740" y="444" font-family="monospace" font-size="14" fill="#10B981" text-anchor="middle">Non-Transferable NFT</text>
